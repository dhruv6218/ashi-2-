[api]
project_id = "YOUR_PROJECT_ID"

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://astrix.ai", "https://astrix.ai/app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[db]
port = 54322
shadow_port = 54320
major_version = 15

[storage]
enabled = true

[storage.buckets.uploads]
public = false
file_size_limit = "10mb"
allowed_mime_types = ["text/csv", "application/vnd.ms-excel", "application/octet-stream"]

[storage.buckets.avatars]
public = true
file_size_limit = "2mb"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[functions.invite-create]
verify_jwt = true

[functions.invite-accept]
verify_jwt = true

[functions.ingest-signals-csv]
verify_jwt = true

[functions.ingest-accounts-csv]
verify_jwt = true

[functions.classify-signal]
verify_jwt = true

[functions.score-opportunity]
verify_jwt = true

[functions.generate-artifact]
verify_jwt = true

[functions.generate-proof-summary]
verify_jwt = true

[functions.jira-push]
verify_jwt = true

[functions.payment-webhook]
verify_jwt = false

[functions.send-reminders]
verify_jwt = false
